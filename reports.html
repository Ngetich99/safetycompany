<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hazard Control Client Portal</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
}

/* HEADER */

.header{
background:#b30000;
color:white;
display:flex;
align-items:center;
padding:15px 30px;
}

.header img{
height:60px;
margin-right:20px;
}

.header h1{
margin:0;
font-size:22px;
}

/* CONTAINER */

.container{
width:1100px;
margin:40px auto;
background:white;
padding:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* SEARCH */

.search{
margin-bottom:30px;
}

.search input{
padding:10px;
width:280px;
border:1px solid #ccc;
}

.search button{
padding:10px 20px;
background:#b30000;
color:white;
border:none;
cursor:pointer;
}

.search button:hover{
background:#800000;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff5f5;
padding:20px;
border-left:6px solid #b30000;
}

.card h3{
margin-top:0;
color:#b30000;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#b30000;
color:white;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.download{
color:#b30000;
font-weight:bold;
text-decoration:none;
}

.download:hover{
text-decoration:underline;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-warning{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<img src="techlogo.png">

<h1>HAZARD CONTROL TECHNOLOGIES LTD – Client Inspection Portal</h1>

</div>

<div class="container">

<h2>Client Dashboard</h2>

<div class="search">

<input type="email" id="email" placeholder="Enter your email">

<button onclick="loadReports()">Load Reports</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Inspection Compliance</h3>
<p id="compliance">--</p>
</div>

<div class="card">
<h3>Extinguishers Serviced</h3>
<p id="extinguishers">--</p>
</div>

<div class="card">
<h3>Next Inspection Countdown</h3>
<p id="countdown">--</p>
</div>

</div>

<h2>Client Document Archive</h2>

<table id="reportsTable">

<tr>
<th>Inspection Date</th>
<th>Site</th>
<th>Report</th>
</tr>

</table>

</div>

<script>

function loadReports(){

const email=document.getElementById("email").value;

fetch("https://script.google.com/macros/s/AKfycbwnMaF98cfCM4PnhlbpsL3qtasMpGhQKOBP-cGI9I79UqD2t3xgQqipKGJmApB8NlYS/exec?email="+email)

.then(res=>res.json())

.then(data=>{

const table=document.getElementById("reportsTable");

table.innerHTML=`
<tr>
<th>Inspection Date</th>
<th>Site</th>
<th>Report</th>
</tr>
`;

if(data.length===0){

document.getElementById("compliance").innerHTML="No inspection records found";
document.getElementById("extinguishers").innerHTML="0";
document.getElementById("countdown").innerHTML="--";

return;

}

/* POPULATE TABLE */

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${new Date(r.date).toDateString()}</td>
<td>${r.site}</td>
<td><a class="download" href="${r.pdf}" target="_blank">Download PDF</a></td>
</tr>
`;

});

/* TOTAL INSPECTIONS */

document.getElementById("extinguishers").innerHTML=data.length;

/* NEXT INSPECTION */

const lastInspection=new Date(data[data.length-1].date);

const nextInspection=new Date(lastInspection);

nextInspection.setMonth(nextInspection.getMonth()+6);

const today=new Date();

const diffDays=Math.ceil((nextInspection-today)/(1000*60*60*24));

document.getElementById("countdown").innerHTML=diffDays+" days remaining";

/* COMPLIANCE */

if(diffDays>0){

document.getElementById("compliance").innerHTML="<span class='status-ok'>COMPLIANT</span>";

}else{

document.getElementById("compliance").innerHTML="<span class='status-warning'>INSPECTION OVERDUE</span>";

}

});

}

</script>

</body>

</html>
