<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Inspection</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
    }

    .hero{
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color:white;
      padding:40px 20px;
      text-align:center;
    }

    .hero h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:18px;
      opacity:0.9;
    }

    .booking-wrapper{
      width:95%;
      max-width:1200px;
      margin:40px auto;
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      height:85vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Book an Appointment has never been this easy</h1>
    <p>Schedule fire equipment inspections, safety audits ,safety training and consultations here.</p>
  </section>

  <div class="booking-wrapper">
    <iframe 
      src="https://calendar.zoho.com/zc/view/slot-booking/zz080112209f54011ffb009afae2cc5fd3bdea81e19845f51d3699524b5a3f6005e303daa5"
      title="Appointment Booking">
    </iframe>
  </div>

</body>
</html>
