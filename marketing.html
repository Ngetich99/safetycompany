<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OSH Lead Capture</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      border-top: 5px solid #c62828;
      max-width: 420px;
      width: 90%;
    }

    .logo {
      width: 90px;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      margin: 10px 0 8px;
      color: #c62828;
    }

    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background: #c62828;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #a81f1f;
    }

    footer {
      margin-top: 18px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- LOGO -->
    <img src="logo.png" alt="Company Logo" class="logo"/>

    <h1>OSH Lead Capture</h1>

    <p>
      Click below to record a new client from field visits or walk-ins.
    </p>

    <a class="btn"
       href="https://forms.zohopublic.com/icthazard1/form/OSHProspectingLeadCaptureForm/formperma/9fagP2AqWivzFrErll7xkzpf_VKYxjlb8AlvS2zeb98"
       target="_blank">
      Open Lead Form
    </a>

    <footer>© 2026 OSH System</footer>

  </div>

</body>
</html>
